# 기본 프로파일: Kubernetes 배포 시 환경변수(INVENTORY_BASE_URL)로 덮어쓸 수 있다.
# 흐름: order → inventory → payment. inventory 가 payment 호출까지 담당한다.

spring:
  application:
    name: order-service

server:
  port: 8080

# inventory 서비스 베이스 URL (클러스터 내부 DNS).
services:
  inventory:
    base-url: ${INVENTORY_BASE_URL:http://inventory-service:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  # [traces] 10_demo-kiali-traces.sh — Jaeger service명=order-service, 전량 수집(교육용)
  tracing:
    sampling:
      probability: 1.0  # 1.0 미만이면 UI 에 스팬이 안 보일 수 있음
  otlp:
    tracing:
      # k8s 02-order-service OTEL_EXPORTER_OTLP_TRACES_ENDPOINT → 07-otel-collector → Jaeger
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.observe:4318/v1/traces}
  metrics:
    export:
      otlp:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.observe:4318/v1/metrics}
  observations:
    key-values:
      service: ${spring.application.name}

# OpenAPI 스펙(/v3/api-docs) 및 Swagger UI(/swagger-ui.html).
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

logging:
  pattern:
    # [traces] 10_demo 마지막 kubectl logs 와 Jaeger traceId 상관
    correlation: "[%X{traceId:-},%X{spanId:-}] "
  level:
    root: INFO
