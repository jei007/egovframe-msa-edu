# 결제 서비스 공통 설정. 클러스터에서는 OTEL_* 환경변수로 Collector 주소를 넘긴다.

spring:
  application:
    name: payment-service

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  # [traces] 10_demo 케이스 A 말단 스팬 — operation "http post /api/payments"
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.observe:4318/v1/traces}
  metrics:
    export:
      otlp:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.observe:4318/v1/metrics}
  observations:
    key-values:
      service: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "  # [traces] 동일 traceId 로 order·inventory 와 연결
  level:
    root: INFO
