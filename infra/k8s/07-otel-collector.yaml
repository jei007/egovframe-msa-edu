# нҒҙлҹ¬мҠӨн„° кҙҖмёЎмҡ© OpenTelemetry CollectorлҘј DaemonSet мңјлЎң л°°нҸ¬н•ңлӢӨ(л…ёл“ңлӢ№ н•ҳлӮҳ).
# - ServiceAccount + RBAC: k8s л©”нғҖлҚ°мқҙн„° ліҙк°•(k8sattributes) мӢң Pod/Node м •ліҙ мЎ°нҡҢмҡ©.
# - ConfigMap: OTLP мҲҳмӢ  + л…ёл“ңмқҳ м»Ён…Ңмқҙл„Ҳ лЎңк·ё(filelog) мҲҳм§‘ вҶ’ JaegerВ·LokiВ·Prometheus(мҠӨнҒ¬л Ҳмқҙн”„мҡ© л©”нҠёлҰӯ м—”л“ңнҸ¬мқёнҠё)лЎң м „лӢ¬.
# - нҳёмҠӨнҠёмқҳ /var/log/pods лҘј мқҪмңјлҜҖлЎң DaemonSet + hostPath л§ҲмҡҙнҠёк°Җ н•„мҡ”н•ҳлӢӨ.
#
# [нҠёл ҲмқҙмҠӨ нҷ•мқё] 10_demo-kiali-traces.sh нҢҢмқҙн”„лқјмқёмқҳ мӨ‘мӢ¬:
#   msaedu м•ұ(Micrometer OTLP HTTP :4318) вҶ’ otel-collector вҶ’ Jaeger(:4317) вҶ’ Kiali Traces нғӯ
#   - verify_tracing_otlp_from_order: order вҶ’ мқҙ Service :4318 POST кё°лҢҖ 200
#   - attributes/kiali(istio.cluster_id) лҲ„лқҪ мӢң Kiali Traces API к°Җ л№„м–ҙ ліҙмһ„

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observe
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: observe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observe
data:
  collector.yaml: |
    # нҢҢл“ң м•Ҳм—җм„ң мӢӨн–үлҗҳлҠ” Collector м„Өм •(OTLPВ·лЎңк·ё мҲҳмӢ  нӣ„ кҙҖмёЎ л°ұм—”л“ңлЎң fan-out).
    receivers:
      otlp:
        protocols:
          # Collector 0.108+ кё°ліёк°’мқҖ localhost:4317/4318 вҶ’ Pod IP лЎңлҠ” Connection refused(503).
          # msaedu м•ұВ·Service кІҪмң  мҲҳмӢ мқ„ мң„н•ҙ 0.0.0.0 м—җ л°”мқёл”©н•ңлӢӨ.
          # [traces] Spring Boot лҠ” HTTP(4318). gRPC(4317) лҠ” Collector вҶ’ Jaeger м „мҶЎмҡ©.
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318  # OTEL_EXPORTER_OTLP_TRACES_ENDPOINT (/v1/traces)
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        start_at: beginning
        include_file_path: true

    processors:
      k8sattributes:
        auth_type: serviceAccount
      # [traces/Kiali] Jaeger мЎ°нҡҢ мӢң tags.istio.cluster_id лҘј н•ӯмғҒ л¶ҷмқёлӢӨ(readQuery).
      # Spring OTLP мҠӨнҢ¬м—җ м—Ҷмңјл©ҙ 10_demo мқҳ verify_tracing_kiali_app_traces к°Җ 0кұҙ.
      # к°’мқҖ infra/helm/kiali.yaml мқҳ kubernetes_config.cluster_name кіј лҸҷмқјн•ҙм•ј н•ңлӢӨ.
      attributes/kiali:
        actions:
          - key: istio.cluster_id
            value: Kubernetes
            action: upsert
      batch:
        timeout: 5s
        send_batch_size: 1024

    exporters:
      prometheus:
        # kube-prometheus-stack additionalScrapeConfigs к°Җ :8889 лҘј мҠӨнҒ¬лһ©.
        endpoint: 0.0.0.0:8889
      loki:
        endpoint: http://loki-gateway.observe/loki/api/v1/push
      # [traces] Jaeger Helm(all-in-one) Service `jaeger` OTLP gRPC мҲҳмӢ  вҶ’ Query UI :16686
      otlp/jaeger:
        endpoint: jaeger.observe:4317
        tls:
          insecure: true

    service:
      pipelines:
        # [traces] м•ұ мҠӨнҢ¬ мҲҳм§‘ нҢҢмқҙн”„лқјмқё вҖ” 10_demo мјҖмқҙмҠӨ A 3лӢЁ мҠӨнҢ¬(orderвҶ’inventoryвҶ’payment) м ҖмһҘ кІҪлЎң
        traces:
          receivers: [otlp]
          processors: [k8sattributes, attributes/kiali, batch]
          exporters: [otlp/jaeger]
        metrics:
          receivers: [otlp]
          processors: [k8sattributes, batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp, filelog]
          processors: [k8sattributes, batch]
          exporters: [loki]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: observe
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector  # k8sattributes н”„лЎңм„ём„ңмҡ©
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.108.0
          args: ["--config=/conf/collector.yaml"]
          ports:
            - containerPort: 4317  # OTLP gRPC (Jaeger лЎң мһ¬м „мҶЎ)
            - containerPort: 4318  # OTLP HTTP (Spring Micrometer)
            - containerPort: 8889  # Prometheus exporter
          volumeMounts:
            - name: otel-config
              mountPath: /conf
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observe
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    # [traces] Cluster DNS otel-collector.observe:4318 вҖ” 02~04 Deployment мқҳ OTLP env мҷҖ м§қ
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889
