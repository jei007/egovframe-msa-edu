# 재고 서비스: latest(정상) / risky(5xx 주입) 두 버전을 운영한다.
# - 단일 Service `inventory-service` 가 두 Deployment 를 모두 endpoint 로 잡고
#   Istio 기본 ROUND_ROBIN 으로 라운드로빈 분산한다.
# - 10-inventory-circuit-breaking.yaml 의 outlierDetection 으로 risky 가 회로 차단되면
#   요청이 latest 로만 라우팅된다.
# - latest 는 HPA 로 부하 증가 시 스케일 아웃한다(metrics-server 필요).
#
# [서킷브레이크·스케일아웃] 09_demo-inventory-circuit-break.sh:
#   - risky: 503 주입 → outlierDetection 카운트 | latest: CB 후 100% 트래픽 + HPA 대상
#   - 단일 Service → 10-inventory-circuit-breaking.yaml ROUND_ROBIN
#   - HPA: inventory-service-latest-hpa (하단) — 02_install-istio.sh metrics-server 필요
#
# [트레이스 확인] 10_demo-kiali-traces.sh:
#   - 케이스 A(latest): 중간 스팬 "http post /api/inventories/reserve" + payment 자식 스팬
#   - 케이스 B(risky, 09 Phase1 직후): 503 스팬, payment 스팬 없음

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-latest
  namespace: msaedu
  # [HPA] scaleTargetRef 대상 — CB 격리 후 트래픽이 몰리는 정상 인스턴스
  labels:
    app: inventory-service
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
      version: latest
  template:
    metadata:
      labels:
        app: inventory-service
        version: latest
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
        # [HPA] latest Pod 다수 + HPA scaleUp 시 노드 여유 — Envoy proxy 리소스 상한
        sidecar.istio.io/proxyCPU: "10m"
        sidecar.istio.io/proxyMemory: "128Mi"
    spec:
      containers:
        - name: inventory-service
          image: your-registry/inventory-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: INVENTORY_VERSION
              value: latest
            - name: INVENTORY_FAULT_MODE
              value: none  # [circuit-breaker] 503 미주입 — CB 발동 후 유일한 라우팅 대상
            - name: PAYMENT_BASE_URL
              value: http://payment-service:8081
            # [traces] OTLP — 동일 traceId 로 payment 스팬과 연결(Micrometer 전파)
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://otel-collector.observe:4318/v1/traces
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: http://otel-collector.observe:4318/v1/metrics
          resources:
            # [HPA] 09_demo Phase3: cpu requests 20m(cpu core 2%) → CB 후 부하 시 utilization↑ → replica 증가
            # (istio-proxy 제외하고 inventory-service 컨테이너 CPU 만 HPA 가 본다)
            requests:
              cpu: 20m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-risky
  namespace: msaedu
  # [circuit-breaker] RR 의 절반 — always-5xx 로 503 → consecutive5xxErrors 누적
  labels:
    app: inventory-service
    version: risky
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
      version: risky
  template:
    metadata:
      labels:
        app: inventory-service
        version: risky
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
    spec:
      containers:
        - name: inventory-service
          image: your-registry/inventory-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: INVENTORY_VERSION
              value: risky
            - name: INVENTORY_FAULT_MODE
              value: always-5xx  # [circuit-breaker] reserve 503 → order 502, outlier 10회 후 eject
            - name: PAYMENT_BASE_URL
              value: http://payment-service:8081
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://otel-collector.observe:4318/v1/traces
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: http://otel-collector.observe:4318/v1/metrics
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: msaedu
  labels:
    app: inventory-service
spec:
  # [circuit-breaker] latest+risky 를 하나의 ClusterIP — 10-inventory-circuit-breaking ROUND_ROBIN
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
# [HPA·스케일아웃] 09_demo Phase [3/3]: CB 후 latest 100% + 반복 POST → replica 1→N
# 전제: metrics-server (02_install-istio.sh) | 관찰: kubectl get hpa,deploy -n msaedu -w
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-service-latest-hpa  # 09_demo 스크립트가 jsonpath 로 조회
  namespace: msaedu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-service-latest
  minReplicas: 1
  maxReplicas: 5   # [HPA] 교육 데모 상한
  metrics:
    # [HPA] Pod 전체 CPU 는 istio-proxy 포함 시 unknown → inventory-service 컨테이너만
    - type: ContainerResource
      containerResource:
        name: cpu
        container: inventory-service
        target:
          type: Utilization
          averageUtilization: 50  # [HPA] 50% 초과 시 scaleUp
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15   # [HPA] 15초마다 최대 +2 Pod (09_demo Phase3 관찰)
    scaleDown:
      stabilizationWindowSeconds: 180  # [HPA] 데모 종료 후 천천히 축소
