# inventory-service 라운드로빈 + 서킷브레이커 (Kiali Traffic Graph 실습용).
#
# [서킷브레이크·스케일아웃] 09_demo-inventory-circuit-break.sh 가 검증하는 Istio 정책(핵심):
#   - subset: latest(정상) / risky(INVENTORY_FAULT_MODE=always-5xx → 503, 04-inventory-service.yaml)
#   - ROUND_ROBIN: 단일 Service inventory-service → latest|risky Pod 번갈아 분산
#   - outlierDetection: risky endpoint 5xx 연속 10회 → 50s 격리 → latest 100%
#   - 격리 후 Phase [3/3] 부하 → 04 의 inventory-service-latest-hpa 스케일아웃
#   - 스크립트: POST localhost:18088/api/orders 반복 | CB 전 201/502 교차, CB 후 201만
# - subsets 는 Kiali "Versioned app graph" 에서 latest / risky 노드를 분리해 보여주는 데 쓰인다.

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: inventory-service-dr
  namespace: msaedu
spec:
  host: inventory-service
  trafficPolicy:
    # [circuit-breaker] 09_demo Phase1: order→inventory 호출이 latest/risky 로 RR 분산
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    # [circuit-breaker] Istio outlier detection — 앱 레벨 Resilience4j 가 아님
    outlierDetection:
      consecutive5xxErrors: 10   # risky 10회 연속 503 → endpoint eject (RR 이면 약 20회 요청 필요)
      interval: 10s              # 5xx 카운트 윈도
      baseEjectionTime: 50s      # 격리 유지 — 09_demo Phase2 에서 201만 나오는 구간
      maxEjectionPercent: 100
      minHealthPercent: 0
  subsets:
    # [circuit-breaker] 04 Deployment Pod label version 과 일치해야 DR·Kiali graph 가 맞음
    - name: latest
      labels:
        version: latest
    - name: risky
      labels:
        version: risky
