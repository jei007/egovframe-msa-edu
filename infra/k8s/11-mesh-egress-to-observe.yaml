# observe 네임스페이스(Prometheus·Grafana·Jaeger·Loki·Kiali·OTel Collector)는 Istio 사이드카가
# 없는 일반 워크로드다. msaedu 사이드카가 이쪽으로 mTLS 를 시도하면 503 UF/URX 가 발생한다.
# DestinationRule 로 해당 호스트들에 대해 TLS DISABLE 을 명시해 plain HTTP 로 호출하도록 한다.

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: otel-collector-egress
  namespace: msaedu
spec:
  host: otel-collector.observe.svc.cluster.local  # 앱 OTLP·메트릭 전송 대상(필수)
  trafficPolicy:
    tls:
      mode: DISABLE   # observe 에 사이드카 없음 → mTLS 끔
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: prometheus-egress
  namespace: msaedu
spec:
  host: kube-prometheus-stack-prometheus.observe.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: jaeger-egress
  namespace: msaedu
spec:
  host: jaeger.observe.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: loki-gateway-egress
  namespace: msaedu
spec:
  host: loki-gateway.observe.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
