# 결제 서비스: inventory-service 가 HTTP로 호출한다(말단).
# simulate-delay API로 지연을 줄 수 있어 Istio 타임아웃·재시도 실습에 사용한다.
#
# [트레이스 확인] 10_demo 케이스 A: order → inventory → payment 3단 스팬의 말단.
#   Jaeger operation "http post /api/payments" | 케이스 B(risky 503) 시 payment 스팬 없음.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: msaedu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
    spec:
      containers:
        - name: payment-service
          image: your-registry/payment-service:1.0.0
          # inventory-service 가 내부에서 호출. Ingress 에는 노출하지 않음.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            # [traces] observe/otel-collector 로 스팬 전송(11-mesh-egress TLS DISABLE 필요)
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://otel-collector.observe:4318/v1/traces
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: http://otel-collector.observe:4318/v1/metrics
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: msaedu
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
