# inventory → payment 호출에 대한 보조 정책(타임아웃·재시도).
# [서킷브레이크] 09_demo 의 핵심 CB·RR·HPA 는 order→inventory 구간:
#   10-inventory-circuit-breaking.yaml + 04-inventory-service.yaml (본 파일과 무관)

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: payment-service-policy
  namespace: msaedu
spec:
  hosts:
    - payment-service
  http:
    - timeout: 2s          # inventory → payment 전체 요청 상한
      retries:
        attempts: 2
        perTryTimeout: 1s
        # 5xx·연결 실패 시 재시도(결제 지연 시뮬레이션과 별개 — inventory CB 와 구분).
        retryOn: gateway-error,connect-failure,refused-stream,5xx
      route:
        - destination:
            host: payment-service
            port:
              number: 8081
