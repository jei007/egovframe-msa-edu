# 재고 서비스 공통 설정. order → inventory → payment 흐름의 중간 단계.

spring:
  application:
    name: inventory-service

server:
  port: 8082

# payment 서비스 베이스 URL (클러스터 내부 DNS).
services:
  payment:
    base-url: ${PAYMENT_BASE_URL:http://payment-service:8081}

# [circuit-breaker] k8s 04: latest=none / risky=always-5xx → 503 → Istio outlierDetection(10)
# 09_demo: risky 503 누적 후 latest 100% | order 는 502 (inventory-5xx)
inventory:
  version: ${INVENTORY_VERSION:latest}
  fault:
    mode: ${INVENTORY_FAULT_MODE:none}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  # [traces] 10_demo 중간 스팬 — "http post /api/inventories/reserve"
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://otel-collector.observe:4318/v1/traces}
  metrics:
    export:
      otlp:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector.observe:4318/v1/metrics}
  observations:
    key-values:
      service: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
  level:
    root: INFO
